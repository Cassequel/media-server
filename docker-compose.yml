services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: rockflix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rockflix-net

  api:
    build: ./Rockflix.API
    restart: always
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=rockflix;Username=postgres;Password=${DB_PASSWORD}"
      ASPNETCORE_URLS: "http://+:5244"
      ASPNETCORE_ENVIRONMENT: "Production"
      Media__RootPath: "/mnt/media"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "Rockflix"
      Jwt__Audience: "RockflixUsers"
      Tmdb__ApiKey: "${TMDB_API_KEY}"
      Radarr__BaseUrl: "http://192.168.86.101:7878"
      Radarr__ApiKey: "${RADARR_API_KEY}"
      Sonarr__BaseUrl: "http://192.168.86.101:8989"
      Sonarr__ApiKey: "${SONARR_API_KEY}"
      Telegram__BotToken: "${TELEGRAM_BOT_TOKEN}"
      Telegram__InviteCode: "${TELEGRAM_INVITE_CODE}"
      Anthropic__ApiKey: "${ANTHROPIC_API_KEY}"
      Radarr__RootFolderPath: "/movies"
      Radarr__QualityProfileId: "${RADARR_QUALITY_PROFILE_ID}"
      Sonarr__RootFolderPath: "/tv"
      Sonarr__QualityProfileId: "${SONARR_QUALITY_PROFILE_ID}"
    volumes:
      - /mnt/media:/mnt/media
    depends_on:
      - db
    networks:
      - rockflix-net

  client:
    build: ./rockflix-client
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - rockflix-net

volumes:
  postgres_data:

networks:
  rockflix-net: